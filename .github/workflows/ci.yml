name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Lint: composer validate ───────────────────────────────────────────────
  lint-composer:
    name: "Composer validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      - run: composer validate --strict

  # ── Lint: ECS (PHP 8.2, 8.3, 8.4) ────────────────────────────────────────
  lint-ecs:
    name: "ECS (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none
      - uses: ramsey/composer-install@v3
      - run: vendor/bin/ecs check

  # ── Lint: PHPStan (PHP 8.2, 8.3, 8.4) ────────────────────────────────────
  lint-phpstan:
    name: "PHPStan (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none
      - uses: ramsey/composer-install@v3
      - run: vendor/bin/phpstan analyse -c phpstan.neon --no-progress

  # ── Lint: PHPMD ───────────────────────────────────────────────────────────
  lint-phpmd:
    name: "PHPMD"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none
      - uses: ramsey/composer-install@v3
      - run: vendor/bin/phpmd src/ ansi phpmd.xml --exclude 'Migrations/*'

  # ── Lint: YAML / Twig / Container ─────────────────────────────────────────
  lint-symfony:
    name: "Symfony lint (YAML / Twig / Container)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, intl, gd
          tools: composer
          coverage: none
      - uses: ramsey/composer-install@v3
      - run: vendor/bin/console lint:yaml config --env=test
      - run: vendor/bin/console lint:twig --no-debug templates/ --env=test
      - run: vendor/bin/console lint:container --env=test

  # ── PHPUnit: Unit (no DB) ─────────────────────────────────────────────────
  phpunit-unit:
    name: "PHPUnit Unit (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, intl, gd
          tools: composer
          coverage: none
      - uses: ramsey/composer-install@v3
      - run: vendor/bin/phpunit --testsuite=unit

  # ── PHPUnit: Integration (with DB) ────────────────────────────────────────
  phpunit-integration:
    name: "PHPUnit Integration (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sylius_hipay_plugin_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, intl, gd
          tools: composer
          coverage: none
      - uses: ramsey/composer-install@v3
      - name: Setup database
        env:
          DATABASE_TEST_URL: mysql://root:root@127.0.0.1:3306/sylius_hipay_plugin_test?charset=utf8mb4&serverVersion=8.0
        run: |
          vendor/bin/console doctrine:database:create --if-not-exists --env=test
          vendor/bin/console doctrine:migrations:migrate --no-interaction --env=test
          vendor/bin/console sylius:payment:generate-key --no-interaction --env=test
      - name: Run tests
        env:
          DATABASE_TEST_URL: mysql://root:root@127.0.0.1:3306/sylius_hipay_plugin_test?charset=utf8mb4&serverVersion=8.0
          HIPAY_TEST_API_USERNAME: ${{ secrets.HIPAY_TEST_API_USERNAME }}
          HIPAY_TEST_API_PASSWORD: ${{ secrets.HIPAY_TEST_API_PASSWORD }}
        run: vendor/bin/phpunit --testsuite=integration

  # ── PHPUnit: Functional (with DB) ─────────────────────────────────────────
  phpunit-functional:
    name: "PHPUnit Functional (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sylius_hipay_plugin_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, intl, gd
          tools: composer
          coverage: none
      - uses: ramsey/composer-install@v3
      - name: Setup database
        env:
          DATABASE_TEST_URL: mysql://root:root@127.0.0.1:3306/sylius_hipay_plugin_test?charset=utf8mb4&serverVersion=8.0
        run: |
          vendor/bin/console doctrine:database:create --if-not-exists --env=test
          vendor/bin/console doctrine:migrations:migrate --no-interaction --env=test
          vendor/bin/console sylius:payment:generate-key --no-interaction --env=test
      - name: Run tests
        env:
          DATABASE_TEST_URL: mysql://root:root@127.0.0.1:3306/sylius_hipay_plugin_test?charset=utf8mb4&serverVersion=8.0
          HIPAY_TEST_API_USERNAME: ${{ secrets.HIPAY_TEST_API_USERNAME }}
          HIPAY_TEST_API_PASSWORD: ${{ secrets.HIPAY_TEST_API_PASSWORD }}
        run: vendor/bin/phpunit --testsuite=functional

  # ── Acceptance: Behat ─────────────────────────────────────────────────────
  behat:
    name: "Behat acceptance"
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sylius_hipay_plugin_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, intl, gd
          tools: composer
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: ramsey/composer-install@v3
      - name: Build front-end assets
        run: |
          cd vendor/sylius/test-application
          yarn install --frozen-lockfile
          yarn build
          cd $GITHUB_WORKSPACE
          vendor/bin/console assets:install --env=test
      - name: Set up application
        env:
          DATABASE_TEST_URL: mysql://root:root@127.0.0.1:3306/sylius_hipay_plugin_test?charset=utf8mb4&serverVersion=8.0
        run: |
          vendor/bin/console doctrine:database:create --if-not-exists --env=test
          vendor/bin/console doctrine:migrations:migrate --no-interaction --env=test
          vendor/bin/console sylius:payment:generate-key --no-interaction --env=test
          vendor/bin/console sylius:fixtures:load --no-interaction --env=test
      - name: Install Chromium
        run: npx --yes playwright install chromium --with-deps
      - name: Run Behat
        env:
          DATABASE_TEST_URL: mysql://root:root@127.0.0.1:3306/sylius_hipay_plugin_test?charset=utf8mb4&serverVersion=8.0
          HIPAY_TEST_API_USERNAME: ${{ secrets.HIPAY_TEST_API_USERNAME }}
          HIPAY_TEST_API_PASSWORD: ${{ secrets.HIPAY_TEST_API_PASSWORD }}
        run: vendor/bin/behat --no-interaction --format=progress --strict
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behat-failures
          path: etc/build/
          retention-days: 7
