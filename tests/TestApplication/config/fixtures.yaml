sylius_fixtures:
    suites:
        default:
            fixtures:
                channel:
                    options:
                        custom:
                            fashion_web_store:
                                name: 'Fashion Web Store'
                                code: 'FASHION_WEB'
                                locales:
                                    - '%locale%'
                                currencies:
                                    - 'EUR'
                                enabled: true
                                hostname: '%env(resolve:SYLIUS_FIXTURES_HOSTNAME)%'
                                theme_name: '%env(resolve:SYLIUS_FIXTURES_THEME_NAME)%'
                                shop_billing_data:
                                    company: 'HiPay'
                                    tax_id: '0001112222'
                                    country_code: 'FR'
                                    street: '94 rue de Villiers'
                                    city: 'LEVALLOIS-PERRET'
                                    postcode: '92300'
                                menu_taxon: 'MENU_CATEGORY'
                                contact_phone_number: '+41 123 456 789'
                                contact_email: '%env(MAILER_SENDER_EMAIL)%'
                geographical:
                    options:
                        countries:
                            - 'US'
                            - 'FR'
                            - 'DE'
                            - 'AU'
                            - 'CA'
                            - 'MX'
                            - 'NZ'
                            - 'PT'
                            - 'ES'
                            - 'CN'
                            - 'GB'
                            - 'PL'
                            - 'NL'
                            - 'BE'
                        zones:
                            WORLD:
                                name: 'Rest of the World'
                                countries:
                                    - 'FR'
                                    - 'DE'
                                    - 'AU'
                                    - 'CA'
                                    - 'MX'
                                    - 'NZ'
                                    - 'PT'
                                    - 'ES'
                                    - 'CN'
                                    - 'GB'
                                    - 'PL'
                                    - 'NL'
                                    - 'BE'
                                    - 'US'
                shipping_method:
                    options:
                        custom:
                            ups:
                                code: 'ups'
                                name: 'UPS'
                                zone: 'WORLD'
                                enabled: true
                                channels:
                                    - 'FASHION_WEB'
                            dhl_express:
                                code: 'dhl_express'
                                name: 'DHL Express'
                                zone: 'WORLD'
                                enabled: true
                                channels:
                                    - 'FASHION_WEB'
                            fedex:
                                code: 'fedex'
                                name: 'FedEx'
                                zone: 'WORLD'
                                enabled: true
                                channels:
                                    - 'FASHION_WEB'
                hipay_account:
                    options:
                        custom:
                            - name: 'Test account all payment'
                              code: 'test_account_all_payment'
                              api_username: 'test_pass_placeholder'
                              api_password: 'test_pass_placeholder'
                              secret_passphrase: 'test_pass_placeholder'
                              public_username: 'test_pass_placeholder'
                              public_password: 'test_pass_placeholder'
                              test_api_username: '%env(resolve:HIPAY_TEST_API_USERNAME)%'
                              test_api_password: '%env(resolve:HIPAY_TEST_API_PASSWORD)%'
                              test_secret_passphrase: '%env(resolve:HIPAY_TEST_SECRET_PASSPHRASE)%'
                              test_public_username: '%env(resolve:HIPAY_TEST_PUBLIC_USERNAME)%'
                              test_public_password: '%env(resolve:HIPAY_TEST_PUBLIC_PASSWORD)%'
                              debug_mode: true
                            - name: 'Test account Apple only'
                              code: 'test_account_apple_only'
                              api_username: 'test_pass_placeholder'
                              api_password: 'test_pass_placeholder'
                              secret_passphrase: 'test_pass_placeholder'
                              public_username: 'test_pass_placeholder'
                              public_password: 'test_pass_placeholder'
