                              test_api_password: '%env(resolve:HIPAY_TEST_API_PASSWORD_APPLE)%'
                              test_secret_passphrase: '%env(resolve:HIPAY_TEST_SECRET_PASSPHRASE_APPLE)%'
                              test_public_username: '%env(resolve:HIPAY_TEST_PUBLIC_USERNAME)%'
                              test_public_password: '%env(resolve:HIPAY_TEST_PUBLIC_PASSWORD)%'
                              debug_mode: true
