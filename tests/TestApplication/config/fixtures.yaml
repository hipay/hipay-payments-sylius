                                usePayum: false
                                enabled: true
                                gatewayName: 'ideal'
                                gatewayFactory: 'hipay_hosted_fields'
                                gatewayConfig:
                                    account: 'test_account_all_payment'
                                    payment_product: 'ideal'
                                    use_authorize: false
                                    configuration:
                                        allowed_countries:
