    hooks:
        'sylius_shop.checkout#stylesheets':
            hipay_stylesheets:
                template: '@SyliusHiPayPlugin/shop/checkout/stylesheets/css.html.twig'
                priority: -1000
                
        'sylius_shop.checkout#javascripts':
            hipay_js_sdk:
                template: '@SyliusHiPayPlugin/shop/checkout/javascripts/hipay_js_sdk.html.twig'
                priority: -1000
        
        'sylius_shop.checkout.select_payment.content.form.select_payment.payment.choice.hipay_hosted_fields':
