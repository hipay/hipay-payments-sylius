                template: '@SyliusHiPayPlugin/shop/checkout/select_payment/content/form/select_payment/payment/choice/hipay_hosted_fields/details.html.twig'
                priority: 100
                
        'sylius_shop.checkout.select_payment.content.form.select_payment.payment.choice.hipay_hosted_fields.details':
            name:
                template: '@SyliusHiPayPlugin/shop/checkout/select_payment/content/form/select_payment/payment/choice/hipay_hosted_fields/details/name.html.twig'
                priority: 100
            description:
                template: '@SyliusHiPayPlugin/shop/checkout/select_payment/content/form/select_payment/payment/choice/hipay_hosted_fields/details/description.html.twig'
                priority: 0
        
