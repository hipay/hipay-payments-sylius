        # ------------------------------------------------------------------
        # Hosted Fields LiveComponent inner hooks (hookable per product)
        # ------------------------------------------------------------------
        'hipay_hosted_fields.loader':
            default:
                template: '@SyliusHiPayPlugin/components/hosted_fields/loader.html.twig'
                priority: 0
        'hipay_hosted_fields.error':
            default:
                template: '@SyliusHiPayPlugin/components/hosted_fields/error.html.twig'
                priority: 0
        'hipay_hosted_fields.form':
