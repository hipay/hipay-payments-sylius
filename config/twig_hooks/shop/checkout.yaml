                template: '@SyliusHiPayPlugin/components/hosted_fields/form.html.twig'
                priority: 0
        'hipay_hosted_fields.button':
            default:
                template: '@SyliusHiPayPlugin/components/hosted_fields/button.html.twig'
                priority: 0

        # PayPal overrides
        'hipay_hosted_fields.form.paypal':
            default:
                template: '@SyliusHiPayPlugin/components/hosted_fields/paypal/form.html.twig'
                priority: 0
        'hipay_hosted_fields.button.paypal':
            default:
                template: '@SyliusHiPayPlugin/components/hosted_fields/paypal/button.html.twig'
                priority: 0

        # Apple Pay overrides
        'hipay_hosted_fields.form.apple-pay':
            default:
                template: '@SyliusHiPayPlugin/components/hosted_fields/apple-pay/form.html.twig'
                priority: 0
        'hipay_hosted_fields.button.apple-pay':
            default:
                template: '@SyliusHiPayPlugin/components/hosted_fields/apple-pay/button.html.twig'
                priority: 0

        'sylius_shop.checkout.select_payment.content.form':
            navigation:
                template: '@SyliusHiPayPlugin/shop/checkout/select_payment/content/form/navigation.html.twig'
